name: Mirror to GitCode

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间 00:30 运行（UTC 16:30），在 update-readme 之后自动补同步
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          git remote add gitcode https://badhope:${GITCODE_TOKEN}@gitcode.com/badhope/MS33834.git
          git push --force --set-upstream gitcode main
